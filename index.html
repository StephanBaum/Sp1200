<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SP-1200</title>
  <link rel="stylesheet" href="/css/sp1200.css">
</head>
<body>
  <div id="sp1200" class="sp1200">
    <!-- Real SP-1200 photo as background -->
    <img src="/assets/sp1200-panel.png" class="panel-img" alt="SP-1200" draggable="false">

    <!-- LCD overlay — dynamic text rendered on top of the photo LCD area -->
    <div class="lcd-overlay" id="lcd-overlay">
      <span class="lcd-text" id="display-mode">Song</span>
      <span class="lcd-text" id="display-bpm">01</span>
      <span class="lcd-text" id="display-pattern">&#9833;120.0</span>
      <br>
      <span class="lcd-text" id="display-bar">&nbsp;</span>
      <span class="lcd-text" id="display-bank">&nbsp;</span>
      <span class="lcd-text" id="display-memory">&nbsp;</span>
    </div>

    <!-- ZONE 1: Module SELECT buttons -->
    <button class="hit" id="btn-sample-edit" style="left:15.5%;top:14.8%;width:3.2%;height:2.8%" title="Set-up"></button>
    <button class="hit" id="btn-load-sample" style="left:27.2%;top:14.8%;width:3.2%;height:2.8%" title="Disk"></button>
    <button class="hit" id="btn-auto-repeat" style="left:35.8%;top:14.8%;width:3.2%;height:2.8%" title="Sync"></button>
    <button class="hit" id="btn-mic-record" style="left:43.5%;top:16.2%;width:3.2%;height:2.8%" title="Sample"></button>

    <!-- Master Control: Tempo/nav/Enter row -->
    <button class="hit" style="left:72.5%;top:28.5%;width:4%;height:2.2%"></button>
    <button class="hit" style="left:77%;top:28.5%;width:2.5%;height:2.2%"></button>
    <button class="hit" style="left:80%;top:28.5%;width:2.5%;height:2.2%"></button>
    <button class="hit" style="left:83%;top:28.5%;width:3.5%;height:2.2%"></button>

    <!-- Master Control: Numeric keypad 4x3 -->
    <button class="hit key" style="left:75.2%;top:34%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:79%;top:34%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:82.8%;top:34%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:75.2%;top:37.5%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:79%;top:37.5%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:82.8%;top:37.5%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:75.2%;top:41%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:79%;top:41%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:82.8%;top:41%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:75.2%;top:44.5%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:79%;top:44.5%;width:3.2%;height:2.8%"></button>
    <button class="hit key" style="left:82.8%;top:44.5%;width:3.2%;height:2.8%"></button>

    <!-- ZONE 2: Programming row 1 (10 buttons) -->
    <button class="hit prog" id="btn-pattern" style="left:17%;top:50.2%;width:3%;height:2.5%"></button>
    <button class="hit prog" id="btn-tap-tempo" style="left:23.5%;top:50.2%;width:3%;height:2.5%"></button>
    <button class="hit prog" id="btn-truncate" style="left:30%;top:50.2%;width:3%;height:2.5%"></button>
    <button class="hit prog rec" id="btn-record" style="left:36.5%;top:50.2%;width:3%;height:2.5%"></button>
    <button class="hit prog" id="btn-song" style="left:43%;top:50.2%;width:3%;height:2.5%"></button>
    <button class="hit prog" id="btn-loop" style="left:49.5%;top:50.2%;width:3%;height:2.5%"></button>
    <button class="hit prog" id="btn-reverse" style="left:56%;top:50.2%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:62.5%;top:50.2%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:69%;top:50.2%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:75.5%;top:50.2%;width:3%;height:2.5%"></button>

    <!-- Programming row 2 -->
    <button class="hit prog" style="left:17%;top:54.5%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:23.5%;top:54.5%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:30%;top:54.5%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:36.5%;top:54.5%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:43%;top:54.5%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:49.5%;top:54.5%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:56%;top:54.5%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:62.5%;top:54.5%;width:3%;height:2.5%"></button>
    <button class="hit prog" id="btn-step-edit" style="left:69%;top:54.5%;width:3%;height:2.5%"></button>
    <button class="hit prog" style="left:75.5%;top:54.5%;width:3%;height:2.5%"></button>

    <!-- ZONE 3 Performance: Mode buttons (left) -->
    <button class="hit mode-btn active" data-mode="volume" style="left:13.5%;top:62.5%;width:4.2%;height:3%"></button>
    <button class="hit mode-btn" data-mode="pitch" style="left:13.5%;top:66%;width:4.2%;height:2.5%"></button>
    <button class="hit" style="left:13.5%;top:69%;width:4.2%;height:3%"></button>
    <div class="fader-mode-switch" style="display:none">
      <button class="mode-btn active" data-mode="volume"></button>
      <button class="mode-btn" data-mode="pitch"></button>
    </div>

    <!-- Select + Bank buttons -->
    <button class="hit" style="left:13.5%;top:73%;width:4.2%;height:2.5%"></button>
    <button class="hit bank-btn active" data-bank="0" style="left:13.5%;top:77%;width:4.2%;height:2.5%"></button>
    <button class="hit bank-btn" data-bank="1" style="left:13.5%;top:80%;width:4.2%;height:2.5%"></button>
    <button class="hit bank-btn" data-bank="2" style="left:13.5%;top:83%;width:4.2%;height:2.5%"></button>
    <button class="hit bank-btn" data-bank="3" style="left:13.5%;top:86%;width:4.2%;height:2.5%"></button>

    <!-- 8 Faders (transparent overlay on photo faders) -->
    <div class="fader-hit" style="left:21.5%;top:60%;width:4%;height:24%"><div class="fader-track"><div class="fader-thumb"></div></div></div>
    <div class="fader-hit" style="left:28.5%;top:60%;width:4%;height:24%"><div class="fader-track"><div class="fader-thumb"></div></div></div>
    <div class="fader-hit" style="left:35.5%;top:60%;width:4%;height:24%"><div class="fader-track"><div class="fader-thumb"></div></div></div>
    <div class="fader-hit" style="left:42.5%;top:60%;width:4%;height:24%"><div class="fader-track"><div class="fader-thumb"></div></div></div>
    <div class="fader-hit" style="left:49.5%;top:60%;width:4%;height:24%"><div class="fader-track"><div class="fader-thumb"></div></div></div>
    <div class="fader-hit" style="left:56.5%;top:60%;width:4%;height:24%"><div class="fader-track"><div class="fader-thumb"></div></div></div>
    <div class="fader-hit" style="left:63.5%;top:60%;width:4%;height:24%"><div class="fader-track"><div class="fader-thumb"></div></div></div>
    <div class="fader-hit" style="left:70.5%;top:60%;width:4%;height:24%"><div class="fader-track"><div class="fader-thumb"></div></div></div>

    <!-- 8 Pads -->
    <button class="pad" data-pad="0" style="left:20%;top:86.5%;width:5%;height:3.5%"></button>
    <button class="pad" data-pad="1" style="left:27%;top:86.5%;width:5%;height:3.5%"></button>
    <button class="pad" data-pad="2" style="left:34%;top:86.5%;width:5%;height:3.5%"></button>
    <button class="pad" data-pad="3" style="left:41%;top:86.5%;width:5%;height:3.5%"></button>
    <button class="pad" data-pad="4" style="left:48%;top:86.5%;width:5%;height:3.5%"></button>
    <button class="pad" data-pad="5" style="left:55%;top:86.5%;width:5%;height:3.5%"></button>
    <button class="pad" data-pad="6" style="left:62%;top:86.5%;width:5%;height:3.5%"></button>
    <button class="pad" data-pad="7" style="left:69%;top:86.5%;width:5%;height:3.5%"></button>

    <!-- Transport (bottom right) -->
    <button class="hit" id="btn-play" style="left:81%;top:79%;width:5.5%;height:3%"></button>
    <button class="hit" id="btn-stop" style="left:81%;top:82.5%;width:5.5%;height:3%"></button>

    <!-- Hidden JS-required elements -->
    <div style="position:absolute;left:-9999px;opacity:0;pointer-events:none">
      <select id="quantize-select">
        <option value="96">1/4</option><option value="48">1/8</option>
        <option value="32">1/8T</option><option value="24" selected>1/16</option>
        <option value="16">1/16T</option><option value="12">1/32</option>
      </select>
      <input type="range" id="swing-slider" min="50" max="75" value="50">
      <span id="swing-value">50%</span>
    </div>
  </div>

  <input type="file" id="file-input" accept="audio/*" style="display:none">
  <script type="module" src="/js/main.js"></script>
</body>
</html>
