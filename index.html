<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SP-1200 – E-mu Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/sp1200.css">
</head>
<body>
  <div id="sp1200" class="sp1200">

    <!-- ── TOP LABEL BAR ─────────────────────────────────────────── -->
    <div class="top-label">
      <span class="brand-emu">E-mu Systems</span>
      <span class="brand-model">SP-1200</span>
      <span class="brand-subtitle">Sampling Percussion Machine</span>
    </div>

    <!-- ── UPPER SECTION: Function modules + Master Control ────── -->
    <div class="upper-section">

      <!-- ROW of small module groups across the top -->
      <div class="modules-row">

        <!-- SET-UP -->
        <div class="module">
          <div class="module-title">SET-UP</div>
          <div class="module-buttons">
            <button class="fn-btn" id="btn-sample-edit">SAMPLE<br>EDIT</button>
            <button class="fn-btn" id="btn-truncate">TRUNC</button>
            <button class="fn-btn" id="btn-loop">LOOP</button>
            <button class="fn-btn" id="btn-reverse">REVERSE</button>
          </div>
        </div>

        <!-- DISK -->
        <div class="module">
          <div class="module-title">DISK</div>
          <div class="module-buttons">
            <button class="fn-btn" id="btn-load-sample">LOAD</button>
            <button class="fn-btn" id="btn-mic-record">MIC<br>REC</button>
          </div>
        </div>

        <!-- SYNC / SAMPLE -->
        <div class="module">
          <div class="module-title">SAMPLE</div>
          <div class="module-buttons">
            <button class="fn-btn" id="btn-tap-tempo">TAP</button>
            <button class="fn-btn" id="btn-auto-repeat">AUTO<br>RPT</button>
          </div>
        </div>

      </div>

      <!-- MASTER CONTROL: LCD + Keypad + Programming + Transport -->
      <div class="master-control">

        <!-- LCD Display -->
        <div class="lcd-area">
          <div class="lcd-bezel">
            <div class="lcd-screen">
              <div class="lcd-row">
                <span class="lcd-field"><span class="lcd-label">MODE</span><span class="lcd-val" id="display-mode">PAT</span></span>
                <span class="lcd-field"><span class="lcd-label">BPM</span><span class="lcd-val" id="display-bpm">090</span></span>
                <span class="lcd-field"><span class="lcd-label">PAT</span><span class="lcd-val" id="display-pattern">01</span></span>
              </div>
              <div class="lcd-row">
                <span class="lcd-field"><span class="lcd-label">BAR</span><span class="lcd-val" id="display-bar">1</span></span>
                <span class="lcd-field"><span class="lcd-label">BANK</span><span class="lcd-val" id="display-bank">A</span></span>
                <span class="lcd-field"><span class="lcd-label">MEM</span><span class="lcd-val" id="display-memory">10.0s</span></span>
              </div>
            </div>
          </div>
        </div>

        <!-- Numeric Keypad (phone/calculator layout) -->
        <div class="keypad-area">
          <div class="module-title">MASTER CONTROL</div>
          <div class="keypad-grid">
            <button class="key-btn">1</button>
            <button class="key-btn">2</button>
            <button class="key-btn">3</button>
            <button class="key-btn">4</button>
            <button class="key-btn">5</button>
            <button class="key-btn">6</button>
            <button class="key-btn">7</button>
            <button class="key-btn">8</button>
            <button class="key-btn">9</button>
            <button class="key-btn key-btn--wide">ENTER</button>
            <button class="key-btn">0</button>
          </div>
          <div class="keypad-nav">
            <button class="key-btn key-btn--sm">&#9668;</button>
            <button class="key-btn key-btn--sm">&#9658;</button>
            <button class="key-btn key-btn--sm">YES</button>
            <button class="key-btn key-btn--sm">NO</button>
          </div>
        </div>

        <!-- Quantize / Swing / Bank -->
        <div class="params-area">
          <div class="quantize-section">
            <label class="module-label" for="quantize-select">QUANTIZE</label>
            <select class="lcd-select" id="quantize-select">
              <option value="96">1/4</option>
              <option value="48">1/8</option>
              <option value="32">1/8T</option>
              <option value="24" selected>1/16</option>
              <option value="16">1/16T</option>
              <option value="12">1/32</option>
            </select>
          </div>
          <div class="swing-section">
            <label class="module-label" for="swing-slider">SWING</label>
            <div class="swing-row">
              <input class="swing-slider" type="range" id="swing-slider"
                     min="50" max="75" value="50" step="1">
              <span class="swing-value-label" id="swing-value">50%</span>
            </div>
          </div>
          <div class="bank-section">
            <div class="module-label">BANK</div>
            <div class="bank-buttons">
              <button class="bank-btn active" data-bank="0">A</button>
              <button class="bank-btn" data-bank="1">B</button>
              <button class="bank-btn" data-bank="2">C</button>
              <button class="bank-btn" data-bank="3">D</button>
            </div>
          </div>
        </div>

        <!-- PROGRAMMING -->
        <div class="program-area">
          <div class="module">
            <div class="module-title">PROGRAMMING</div>
            <div class="module-buttons">
              <button class="fn-btn fn-btn--mode" id="btn-pattern">PATTERN</button>
              <button class="fn-btn fn-btn--mode" id="btn-song">SONG</button>
              <button class="fn-btn fn-btn--mode" id="btn-step-edit">STEP<br>EDIT</button>
            </div>
          </div>
          <div class="module" style="margin-top:8px">
            <div class="module-title">TRANSPORT</div>
            <div class="module-buttons">
              <button class="fn-btn fn-btn--play" id="btn-play">&#9654; RUN</button>
              <button class="fn-btn fn-btn--stop" id="btn-stop">&#9632; STOP</button>
              <button class="fn-btn fn-btn--record" id="btn-record">&#9679; REC</button>
            </div>
          </div>
        </div>

      </div>

    </div><!-- /upper-section -->

    <!-- ── PERFORMANCE SECTION: Faders + Pads (compact bottom strip) ── -->
    <div class="performance-section">
      <div class="perf-label">PERFORMANCE</div>

      <div class="fader-mode-switch">
        <button class="mode-btn active" data-mode="volume">TUNE/DECAY</button>
        <button class="mode-btn" data-mode="pitch">MIX</button>
      </div>

      <!-- 8 columns: each has a fader on top, pad on bottom -->
      <div class="channels-row">
        <div class="channel"><div class="fader-track"><div class="fader-thumb"></div></div><button class="pad" data-pad="0"><span class="pad-num">1</span></button></div>
        <div class="channel"><div class="fader-track"><div class="fader-thumb"></div></div><button class="pad" data-pad="1"><span class="pad-num">2</span></button></div>
        <div class="channel"><div class="fader-track"><div class="fader-thumb"></div></div><button class="pad" data-pad="2"><span class="pad-num">3</span></button></div>
        <div class="channel"><div class="fader-track"><div class="fader-thumb"></div></div><button class="pad" data-pad="3"><span class="pad-num">4</span></button></div>
        <div class="channel"><div class="fader-track"><div class="fader-thumb"></div></div><button class="pad" data-pad="4"><span class="pad-num">5</span></button></div>
        <div class="channel"><div class="fader-track"><div class="fader-thumb"></div></div><button class="pad" data-pad="5"><span class="pad-num">6</span></button></div>
        <div class="channel"><div class="fader-track"><div class="fader-thumb"></div></div><button class="pad" data-pad="6"><span class="pad-num">7</span></button></div>
        <div class="channel"><div class="fader-track"><div class="fader-thumb"></div></div><button class="pad" data-pad="7"><span class="pad-num">8</span></button></div>
      </div>
    </div>

  </div>

  <input type="file" id="file-input" accept="audio/*" style="display:none">
  <script type="module" src="/js/main.js"></script>
</body>
</html>
