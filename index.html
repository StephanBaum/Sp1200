<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SP-1200 – E-mu Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/sp1200.css">
</head>
<body>
  <div id="sp1200" class="sp1200">

    <!-- ── TOP LABEL BAR ─────────────────────────────────────────── -->
    <div class="top-label">
      <span class="brand-emu">E-mu Systems</span>
      <span class="brand-model">SP-1200</span>
      <span class="brand-subtitle">Sampling Percussion Machine</span>
    </div>

    <!-- ── UPPER SECTION: Controls ───────────────────────────────── -->
    <div class="upper-section">

      <!-- LEFT: LCD Display -->
      <div class="lcd-area">
        <div class="lcd-bezel">
          <div class="lcd-screen">
            <div class="lcd-row">
              <span class="lcd-field"><span class="lcd-label">MODE</span><span class="lcd-val" id="display-mode">PAT</span></span>
              <span class="lcd-field"><span class="lcd-label">BPM</span><span class="lcd-val" id="display-bpm">090</span></span>
              <span class="lcd-field"><span class="lcd-label">PAT</span><span class="lcd-val" id="display-pattern">01</span></span>
            </div>
            <div class="lcd-row">
              <span class="lcd-field"><span class="lcd-label">BAR</span><span class="lcd-val" id="display-bar">1</span></span>
              <span class="lcd-field"><span class="lcd-label">BANK</span><span class="lcd-val" id="display-bank">A</span></span>
              <span class="lcd-field"><span class="lcd-label">MEM</span><span class="lcd-val" id="display-memory">10.0s</span></span>
            </div>
          </div>
        </div>

        <!-- Quantize / Swing / Bank below LCD -->
        <div class="lcd-sub-controls">
          <div class="quantize-section">
            <label class="module-label" for="quantize-select">QUANTIZE</label>
            <select class="lcd-select" id="quantize-select">
              <option value="96">1/4</option>
              <option value="48">1/8</option>
              <option value="32">1/8T</option>
              <option value="24" selected>1/16</option>
              <option value="16">1/16T</option>
              <option value="12">1/32</option>
            </select>
          </div>
          <div class="swing-section">
            <label class="module-label" for="swing-slider">SWING</label>
            <div class="swing-row">
              <input class="swing-slider" type="range" id="swing-slider"
                     min="50" max="75" value="50" step="1">
              <span class="swing-value-label" id="swing-value">50%</span>
            </div>
          </div>
          <div class="bank-section">
            <div class="module-label">BANK</div>
            <div class="bank-buttons">
              <button class="bank-btn active" data-bank="0">A</button>
              <button class="bank-btn" data-bank="1">B</button>
              <button class="bank-btn" data-bank="2">C</button>
              <button class="bank-btn" data-bank="3">D</button>
            </div>
          </div>
        </div>
      </div>

      <!-- CENTER: Function Module Groups -->
      <div class="modules-area">

        <!-- SET-UP module -->
        <div class="module">
          <div class="module-title">SET-UP</div>
          <div class="module-buttons">
            <button class="fn-btn" id="btn-sample-edit"><span>SAMPLE<br>EDIT</span></button>
            <button class="fn-btn" id="btn-truncate"><span>TRUNC</span></button>
            <button class="fn-btn" id="btn-loop"><span>LOOP</span></button>
            <button class="fn-btn" id="btn-reverse"><span>REVERSE</span></button>
          </div>
        </div>

        <!-- DISK module -->
        <div class="module">
          <div class="module-title">DISK</div>
          <div class="module-buttons">
            <button class="fn-btn" id="btn-load-sample"><span>LOAD<br>SAMPLE</span></button>
            <button class="fn-btn" id="btn-mic-record"><span>MIC<br>REC</span></button>
          </div>
        </div>

        <!-- SAMPLE module -->
        <div class="module">
          <div class="module-title">SAMPLE</div>
          <div class="module-buttons">
            <button class="fn-btn" id="btn-tap-tempo"><span>TAP<br>TEMPO</span></button>
            <button class="fn-btn" id="btn-auto-repeat"><span>AUTO<br>RPT</span></button>
          </div>
        </div>

      </div>

      <!-- RIGHT: Programming & Transport -->
      <div class="transport-area">

        <!-- Mode select -->
        <div class="module">
          <div class="module-title">PROGRAM</div>
          <div class="module-buttons">
            <button class="fn-btn fn-btn--mode" id="btn-pattern"><span>PATTERN</span></button>
            <button class="fn-btn fn-btn--mode" id="btn-song"><span>SONG</span></button>
            <button class="fn-btn fn-btn--mode" id="btn-step-edit"><span>STEP<br>EDIT</span></button>
          </div>
        </div>

        <!-- Transport -->
        <div class="module">
          <div class="module-title">TRANSPORT</div>
          <div class="module-buttons">
            <button class="fn-btn fn-btn--play" id="btn-play"><span>&#9654; PLAY</span></button>
            <button class="fn-btn fn-btn--stop" id="btn-stop"><span>&#9632; STOP</span></button>
            <button class="fn-btn fn-btn--record" id="btn-record"><span>&#9679; REC</span></button>
          </div>
        </div>

      </div>

    </div><!-- /upper-section -->

    <!-- ── LOWER SECTION: Faders + Pads ──────────────────────────── -->
    <div class="lower-section">

      <!-- Fader mode switch -->
      <div class="fader-mode-switch">
        <button class="mode-btn active" data-mode="volume">VOL</button>
        <button class="mode-btn" data-mode="pitch">PITCH</button>
      </div>

      <!-- 8 Faders in a row -->
      <div class="faders-row">
        <div class="fader" data-fader="0">
          <div class="fader-label">1</div>
          <div class="fader-track"><div class="fader-thumb"></div></div>
        </div>
        <div class="fader" data-fader="1">
          <div class="fader-label">2</div>
          <div class="fader-track"><div class="fader-thumb"></div></div>
        </div>
        <div class="fader" data-fader="2">
          <div class="fader-label">3</div>
          <div class="fader-track"><div class="fader-thumb"></div></div>
        </div>
        <div class="fader" data-fader="3">
          <div class="fader-label">4</div>
          <div class="fader-track"><div class="fader-thumb"></div></div>
        </div>
        <div class="fader" data-fader="4">
          <div class="fader-label">5</div>
          <div class="fader-track"><div class="fader-thumb"></div></div>
        </div>
        <div class="fader" data-fader="5">
          <div class="fader-label">6</div>
          <div class="fader-track"><div class="fader-thumb"></div></div>
        </div>
        <div class="fader" data-fader="6">
          <div class="fader-label">7</div>
          <div class="fader-track"><div class="fader-thumb"></div></div>
        </div>
        <div class="fader" data-fader="7">
          <div class="fader-label">8</div>
          <div class="fader-track"><div class="fader-thumb"></div></div>
        </div>
      </div>

      <!-- 8 Pads in a horizontal row -->
      <div class="pads-row">
        <button class="pad" data-pad="0">
          <span class="pad-num">1</span>
          <span class="pad-key">Z</span>
        </button>
        <button class="pad" data-pad="1">
          <span class="pad-num">2</span>
          <span class="pad-key">X</span>
        </button>
        <button class="pad" data-pad="2">
          <span class="pad-num">3</span>
          <span class="pad-key">C</span>
        </button>
        <button class="pad" data-pad="3">
          <span class="pad-num">4</span>
          <span class="pad-key">V</span>
        </button>
        <button class="pad" data-pad="4">
          <span class="pad-num">5</span>
          <span class="pad-key">A</span>
        </button>
        <button class="pad" data-pad="5">
          <span class="pad-num">6</span>
          <span class="pad-key">S</span>
        </button>
        <button class="pad" data-pad="6">
          <span class="pad-num">7</span>
          <span class="pad-key">D</span>
        </button>
        <button class="pad" data-pad="7">
          <span class="pad-num">8</span>
          <span class="pad-key">F</span>
        </button>
      </div>

    </div><!-- /lower-section -->

  </div><!-- /sp1200 -->

  <!-- Hidden file input for sample loading -->
  <input type="file" id="file-input" accept="audio/*" style="display:none">

  <script type="module" src="/js/main.js"></script>
</body>
</html>
