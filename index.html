<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SP-1200</title>
  <link rel="stylesheet" href="/css/sp1200.css">
</head>
<body>
  <div id="sp1200" class="sp1200">
    <img src="/assets/sp1200-panel_blank.png" class="panel-img" alt="SP-1200" draggable="false">

    <!-- LCD — authentic 2-line 16-char display -->
    <div class="lcd-overlay" id="lcd-overlay">
      <div class="lcd-line" id="lcd-line1">Seg:01   090.0</div>
      <div class="lcd-line" id="lcd-line2">&nbsp;</div>
      <!-- Bar graph overlay for fader display -->
      <div class="lcd-bars" id="lcd-bars" style="display:none">
        <div class="lcd-bars-row">
          <div class="lcd-bar" id="bar-0"></div>
          <div class="lcd-bar" id="bar-1"></div>
          <div class="lcd-bar" id="bar-2"></div>
          <div class="lcd-bar" id="bar-3"></div>
          <div class="lcd-bar" id="bar-4"></div>
          <div class="lcd-bar" id="bar-5"></div>
          <div class="lcd-bar" id="bar-6"></div>
          <div class="lcd-bar" id="bar-7"></div>
        </div>
        <div class="lcd-line lcd-bars-labels">1 2 3 4 5 6 7 8</div>
      </div>
    </div>

    <!-- ═══ LED INDICATORS ═══ -->
    <!-- Module select LEDs (positions are centers, offset by -0.3%) -->
    <div class="led" id="led-setup" style="left:10.91%;top:16.28%"></div>
    <div class="led" id="led-disk" style="left:28.42%;top:16.28%"></div>
    <div class="led led-yellow" id="led-sync" style="left:46.97%;top:16.28%"></div>
    <div class="led led-yellow" id="led-sample" style="left:55.88%;top:16.28%"></div>
    <!-- Programming mode LEDs -->
    <div class="led led-orange" id="led-song" style="left:13.32%;top:36.61%"></div>
    <div class="led led-yellow" id="led-segment" style="left:13.32%;top:42.23%"></div>
    <!-- Performance mode LEDs -->
    <div class="led led-yellow" id="led-tune" style="left:13.32%;top:55.91%"></div>
    <div class="led led-orange" id="led-mix" style="left:13.32%;top:58.72%"></div>
    <div class="led led-red" id="led-multi" style="left:13.32%;top:61.54%"></div>
    <!-- Bank LEDs -->
    <div class="led led-yellow" id="led-bank-a" style="left:13.32%;top:72.28%"></div>
    <div class="led led-yellow" id="led-bank-b" style="left:13.32%;top:74.45%"></div>
    <div class="led led-yellow" id="led-bank-c" style="left:13.32%;top:78.28%"></div>
    <div class="led led-yellow" id="led-bank-d" style="left:13.32%;top:80.59%"></div>
    <!-- Transport LEDs -->
    <div class="led led-yellow" id="led-run" style="left:82.72%;top:72.15%"></div>
    <div class="led led-yellow" id="led-record" style="left:88.91%;top:72.28%"></div>

    <!-- ═══ MODULE SELECT ═══ -->
    <button class="hit" id="btn-setup" style="left:9.91%;top:18.33%;width:2.41%;height:2.94%" title="Set up"></button>
    <button class="hit" id="btn-disk" style="left:27.45%;top:18.33%;width:2.41%;height:2.94%" title="Disk"></button>
    <button class="hit" id="btn-sync" style="left:45.85%;top:18.33%;width:2.41%;height:2.94%" title="Sync"></button>
    <button class="hit rec" id="btn-sample" style="left:54.84%;top:18.33%;width:2.41%;height:2.94%" title="Sample"></button>

    <!-- ═══ MASTER CONTROL ═══ -->
    <button class="hit" id="btn-tempo" style="left:73.92%;top:29.58%;width:2.41%;height:2.94%" title="Tempo"></button>
    <button class="hit" id="btn-nav-left" style="left:78.63%;top:29.58%;width:2.41%;height:2.94%" title="◄"></button>
    <button class="hit" id="btn-nav-right" style="left:83.35%;top:29.58%;width:2.41%;height:2.94%" title="►"></button>
    <button class="hit" id="btn-enter" style="left:88.07%;top:29.58%;width:2.41%;height:2.94%" title="Enter"></button>

    <!-- ═══ NUMERIC KEYPAD (0-9, labels on faceplate) ═══ -->
    <button class="hit key" data-key="1" style="left:76.85%;top:47.47%;width:2.41%;height:2.94%"></button>
    <button class="hit key" data-key="2" style="left:80.94%;top:47.47%;width:2.41%;height:2.94%"></button>
    <button class="hit key" data-key="3" style="left:85.13%;top:47.47%;width:2.41%;height:2.94%"></button>
    <button class="hit key" data-key="4" style="left:76.85%;top:52.46%;width:2.41%;height:2.94%"></button>
    <button class="hit key" data-key="5" style="left:80.94%;top:52.46%;width:2.41%;height:2.94%"></button>
    <button class="hit key" data-key="6" style="left:85.13%;top:52.46%;width:2.41%;height:2.94%"></button>
    <button class="hit key" data-key="7" style="left:76.85%;top:57.57%;width:2.41%;height:2.94%"></button>
    <button class="hit key" data-key="8" style="left:80.94%;top:57.57%;width:2.41%;height:2.94%"></button>
    <button class="hit key" data-key="9" style="left:85.13%;top:57.57%;width:2.41%;height:2.94%"></button>
    <button class="hit key" data-key="0" style="left:80.94%;top:62.56%;width:2.41%;height:2.94%"></button>

    <!-- ═══ PROGRAMMING (9 dual-function toggles) ═══ -->
    <button class="hit prog" id="prog-1" data-upper="song" data-lower="segment" style="left:9.65%;top:38.01%;width:2.41%;height:2.94%" title="Song / Segment"></button>
    <button class="hit prog" id="prog-2" data-upper="trigger" data-lower="metronome" style="left:20.03%;top:38.01%;width:2.41%;height:2.94%" title="Trigger / Metronome"></button>
    <button class="hit prog" id="prog-3" data-upper="repeat" data-lower="swing" style="left:26.21%;top:38.01%;width:2.41%;height:2.94%" title="Repeat / Swing"></button>
    <button class="hit prog" id="prog-4" data-upper="tabsong" data-lower="copy" style="left:32.4%;top:38.01%;width:2.41%;height:2.94%" title="Tabsong / Copy"></button>
    <button class="hit prog" id="prog-5" data-upper="end" data-lower="time-sig" style="left:38.8%;top:38.01%;width:2.41%;height:2.94%" title="End / Time Signature"></button>
    <button class="hit prog" id="prog-6" data-upper="insert" data-lower="seg-length" style="left:44.98%;top:38.01%;width:2.41%;height:2.94%" title="Insert / Segment Length"></button>
    <button class="hit prog" id="prog-7" data-upper="delete" data-lower="erase" style="left:51.17%;top:38.01%;width:2.41%;height:2.94%" title="Delete / Erase"></button>
    <button class="hit prog" id="prog-8" data-upper="tempo-change" data-lower="auto-correct" style="left:57.46%;top:38.01%;width:2.41%;height:2.94%" title="Tempo Change / Auto Correct"></button>
    <button class="hit prog" id="prog-9" data-upper="mix-change" data-lower="step-program" style="left:63.64%;top:38.01%;width:2.41%;height:2.94%" title="Mix Change / Step Program"></button>

    <!-- ═══ PERFORMANCE: Mode button (cycles) ═══ -->
    <button class="hit mode-btn" id="btn-mode" style="left:9.65%;top:57.57%;width:2.41%;height:2.94%" title="Tune/Decay → Mix → Multi Mode"></button>

    <!-- ═══ KNOBS: Gain, Mix Volume, Metronome Volume ═══ -->
    <div class="knob-wrap" style="left:62.59%;top:16.92%;width:5.24%;height:6.39%">
      <div class="knob" id="knob-gain" title="Gain"><div class="knob-cap"><div class="knob-indicator"></div></div></div>
    </div>
    <div class="knob-wrap" style="left:75.7%;top:36.35%;width:5.77%;height:7.03%">
      <div class="knob" id="knob-mix-vol" title="Mix Volume"><div class="knob-cap"><div class="knob-indicator"></div></div></div>
    </div>
    <div class="knob-wrap" style="left:83.98%;top:36.48%;width:5.77%;height:7.03%">
      <div class="knob" id="knob-metro-vol" title="Metronome Volume"><div class="knob-cap"><div class="knob-indicator"></div></div></div>
    </div>

    <!-- ═══ BANK: ONE cycling button ═══ -->
    <button class="hit bank-btn" id="btn-bank" style="left:9.65%;top:75.09%;width:2.73%;height:3.07%" title="Bank (cycles A→B→C→D)"></button>

    <!-- ═══ 8 FADERS — img-based track + cap ═══ -->
    <div class="fader-hit" style="left:18.77%;top:50.03%;width:5.24%;height:18.54%"><div class="fader-track"><img src="/assets/fader.png" class="fader-thumb" draggable="false"></div></div>
    <div class="fader-hit" style="left:25.06%;top:50.03%;width:5.24%;height:18.54%"><div class="fader-track"><img src="/assets/fader.png" class="fader-thumb" draggable="false"></div></div>
    <div class="fader-hit" style="left:31.14%;top:50.03%;width:5.24%;height:18.54%"><div class="fader-track"><img src="/assets/fader.png" class="fader-thumb" draggable="false"></div></div>
    <div class="fader-hit" style="left:37.43%;top:50.03%;width:5.24%;height:18.54%"><div class="fader-track"><img src="/assets/fader.png" class="fader-thumb" draggable="false"></div></div>
    <div class="fader-hit" style="left:43.62%;top:50.03%;width:5.24%;height:18.54%"><div class="fader-track"><img src="/assets/fader.png" class="fader-thumb" draggable="false"></div></div>
    <div class="fader-hit" style="left:49.91%;top:50.03%;width:5.24%;height:18.54%"><div class="fader-track"><img src="/assets/fader.png" class="fader-thumb" draggable="false"></div></div>
    <div class="fader-hit" style="left:55.99%;top:50.03%;width:5.24%;height:18.54%"><div class="fader-track"><img src="/assets/fader.png" class="fader-thumb" draggable="false"></div></div>
    <div class="fader-hit" style="left:62.28%;top:50.03%;width:5.24%;height:18.54%"><div class="fader-track"><img src="/assets/fader.png" class="fader-thumb" draggable="false"></div></div>

    <!-- ═══ 8 PADS ═══ -->
    <button class="pad" data-pad="0" style="left:19.56%;top:74.51%;width:4.3%;height:5.24%"></button>
    <button class="pad" data-pad="1" style="left:25.74%;top:74.51%;width:4.3%;height:5.24%"></button>
    <button class="pad" data-pad="2" style="left:31.93%;top:74.51%;width:4.3%;height:5.24%"></button>
    <button class="pad" data-pad="3" style="left:38.11%;top:74.51%;width:4.3%;height:5.24%"></button>
    <button class="pad" data-pad="4" style="left:44.3%;top:74.51%;width:4.3%;height:5.24%"></button>
    <button class="pad" data-pad="5" style="left:50.48%;top:74.51%;width:4.3%;height:5.24%"></button>
    <button class="pad" data-pad="6" style="left:56.67%;top:74.51%;width:4.3%;height:5.24%"></button>
    <button class="pad" data-pad="7" style="left:62.86%;top:74.51%;width:4.3%;height:5.24%"></button>

    <!-- ═══ TRANSPORT ═══ -->
    <button class="pad" id="btn-tap-tempo" style="left:75.13%;top:74.64%;width:4.3%;height:5.24%" title="Tap/Repeat"></button>
    <button class="pad" id="btn-run-stop" style="left:81.24%;top:74.64%;width:4.3%;height:5.24%" title="Run/Stop"></button>
    <button class="hit rec" id="btn-record" style="left:88.24%;top:75.6%;width:2.3%;height:2.7%" title="Record/Edit"></button>

    <!-- Hidden functional elements -->
    <div style="position:absolute;left:-9999px;opacity:0;pointer-events:none">
      <select id="quantize-select">
        <option value="96">1/4</option><option value="48">1/8</option>
        <option value="32">1/8T</option><option value="24" selected>1/16</option>
        <option value="16">1/16T</option><option value="12">1/32</option>
      </select>
      <input type="range" id="swing-slider" min="50" max="75" value="50">
      <span id="swing-value">50%</span>
    </div>
  </div>

  <input type="file" id="file-input" accept="audio/*" style="display:none">
  <script type="module" src="/js/main.js"></script>
</body>
</html>
